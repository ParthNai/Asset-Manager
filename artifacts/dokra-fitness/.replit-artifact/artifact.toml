kind = "mobile"
previewPath = "/"
title = "Dokra – Fitness"
version = "1.0.0"
id = "artifacts/dokra-fitness"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19031

[services.development]
run = "pnpm --filter @workspace/dokra-fitness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dokra-fitness", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dokra-fitness", "run", "serve" ]

[services.env]
PORT = "19031"
BASE_PATH = "/"
